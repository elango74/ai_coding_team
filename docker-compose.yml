services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./my_generated_apps:/app/my_generated_apps
    environment:
      - NVIDIA_API_KEY=${NVIDIA_API_KEY}
      - PORT=8000
      - PYTHONUNBUFFERED=1

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend

  landingpage:
    build:
      context: ./landingpage/auto-forge-labs-main
      dockerfile: ../Dockerfile
    ports:
      - "8080:8080"
    volumes:
      - ./landingpage/auto-forge-labs-main:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
